<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>surprise 💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a1e 0%, #2d1b3d 35%, #1e1233 65%, #1a0a1e 100%);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-weight: 400;
            font-size: clamp(18px, 5vw, 28px);
            color: #c9a0dc;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        p {
            font-size: clamp(13px, 3.5vw, 15px);
            color: rgba(255, 255, 255, .7);
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>coming soon 💜</h1>
        <p>this page is still being built for you</p>
    </div>
</body>
</html>
